<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Web Browser</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="browser-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3>Browser</h3>
                <button class="sidebar-toggle" id="sidebar-toggle" title="Close sidebar">✕</button>
            </div>

            <!-- Tab Groups -->
            <div class="sidebar-section">
                <div class="section-header">
                    <h4>Tab Groups</h4>
                    <button class="btn-icon" id="add-group-btn" title="New Group">+</button>
                </div>
                <div id="tab-groups-list" class="tab-groups-list"></div>
            </div>

            <!-- History -->
            <div class="sidebar-section">
                <div class="section-header">
                    <h4>History</h4>
                    <button class="btn-icon" id="clear-history-btn" title="Clear history">🗑</button>
                </div>
                <div class="history-search">
                    <input type="text" id="history-search" placeholder="Search history..." class="search-input">
                </div>
                <div id="history-list" class="history-list"></div>
            </div>

            <!-- Bookmarks -->
            <div class="sidebar-section">
                <div class="section-header">
                    <h4>Bookmarks</h4>
                </div>
                <div id="bookmarks-list" class="bookmarks-list"></div>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Top Bar -->
            <div class="top-bar">
                <div class="left-controls">
                    <button id="back-btn" class="nav-btn" title="Back (Alt+←)">←</button>
                    <button id="forward-btn" class="nav-btn" title="Forward (Alt+→)">→</button>
                    <button id="refresh-btn" class="nav-btn" title="Refresh (Ctrl+R)">⟳</button>
                    <button id="stop-btn" class="nav-btn" title="Stop">⊘</button>
                </div>

                <div class="address-bar-container">
                    <input type="text" id="address-bar" class="address-bar" placeholder="Enter URL or search..." spellcheck="false" autocomplete="off">
                    <div class="search-suggestions" id="search-suggestions"></div>
                    <button id="go-btn" class="go-btn">Go</button>
                </div>

                <div class="right-controls">
                    <button id="home-btn" class="nav-btn" title="Home">🏠</button>
                    <button id="toggle-sidebar-btn" class="nav-btn" title="Toggle Sidebar">☰</button>
                    <button id="settings-btn" class="nav-btn" title="Settings">⚙</button>
                </div>
            </div>

            <!-- Loading Bar -->
            <div class="loading-bar" id="loading-bar"></div>

            <!-- Tabs -->
            <div class="tabs-bar">
                <div id="tabs-container" class="tabs-container"></div>
                <button id="new-tab-btn" class="new-tab-btn" title="New Tab (Ctrl+T)">+</button>
            </div>

            <!-- Status Bar -->
            <div class="status-bar">
                <span id="status-text">Ready</span>
                <span id="status-info">1 tab(s)</span>
            </div>

            <!-- Browser Content -->
            <div class="browser-content">
                <div id="home-page" class="home-page">
                    <div class="home-header">
                        <h1>🌐 Web Browser</h1>
                        <p>Fast, secure, and feature-rich browsing</p>
                    </div>
                    <div class="home-search-container">
                        <input type="text" id="home-search" class="home-search" placeholder="Search or enter URL...">
                    </div>
                    <div class="quick-access">
                        <div class="quick-section">
                            <h3>Quick Links</h3>
                            <div id="quick-links" class="quick-links"></div>
                        </div>
                    </div>
                </div>

                <div id="browser-frame" class="browser-frame">
                    <iframe id="main-frame" class="main-frame" sandbox="allow-same-origin allow-scripts allow-forms allow-popups"></iframe>
                </div>
            </div>
        </div>
    </div>

    <!-- Context Menu -->
    <div id="context-menu" class="context-menu">
        <div class="context-item" onclick="browser.goBack()">← Back</div>
        <div class="context-item" onclick="browser.goForward()">→ Forward</div>
        <hr>
        <div class="context-item" onclick="browser.reloadPage()">⟳ Reload</div>
        <div class="context-item" onclick="viewPageSource()">View Source</div>
        <hr>
        <div class="context-item" onclick="browser.addBookmark()">Add Bookmark</div>
        <div class="context-item" onclick="viewPageInfo()">Page Info</div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Settings</h2>
                <button class="close-btn" onclick="closeModal('settings-modal')">×</button>
            </div>
            <div class="modal-body">
                <div class="settings-section">
                    <h3>Privacy & Security</h3>
                    <label class="checkbox-label">
                        <input type="checkbox" id="javascript-toggle" checked>
                        <span>Enable JavaScript</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="images-toggle" checked>
                        <span>Load Images</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="cookies-toggle" checked>
                        <span>Accept Cookies</span>
                    </label>
                </div>

                <div class="settings-section">
                    <h3>Appearance</h3>
                    <label class="select-label">
                        Theme:
                        <select id="theme-select">
                            <option value="light">Light</option>
                            <option value="dark">Dark</option>
                            <option value="auto">Auto</option>
                        </select>
                    </label>
                </div>

                <div class="settings-section">
                    <h3>Home Page</h3>
                    <label class="input-label">
                        Home URL:
                        <input type="text" id="home-url" value="about:home" class="form-input">
                    </label>
                </div>

                <div class="settings-section">
                    <h3>Cache & Storage</h3>
                    <button class="btn-secondary" onclick="browser.clearCache()">Clear Cache</button>
                    <button class="btn-danger" onclick="browser.clearBrowsingData()">Clear All Data</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Tab Group Modal -->
    <div id="group-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create Tab Group</h2>
                <button class="close-btn" onclick="closeModal('group-modal')">×</button>
            </div>
            <div class="modal-body">
                <input type="text" id="group-name" placeholder="Group name..." class="form-input">
                <select id="group-color" class="form-input">
                    <option value="gray">Gray</option>
                    <option value="blue">Blue</option>
                    <option value="red">Red</option>
                    <option value="green">Green</option>
                    <option value="yellow">Yellow</option>
                    <option value="purple">Purple</option>
                </select>
                <button onclick="browser.createTabGroup()" class="btn-primary">Create Group</button>
            </div>
        </div>
    </div>

    <!-- History Modal -->
    <div id="history-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>History</h2>
                <button class="close-btn" onclick="closeModal('history-modal')">×</button>
            </div>
            <div class="modal-body">
                <div class="history-search-modal">
                    <input type="text" id="history-search-modal" placeholder="Search history..." class="search-input">
                </div>
                <div id="history-modal-list" class="history-modal-list"></div>
            </div>
        </div>
    </div>

    <script src="browser.js"></script>
</body>
</html>
